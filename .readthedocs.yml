version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - cmake
    - doxygen
    - cython3
  jobs:
    install:
      - python -m pip install --upgrade pip
      - python -m pip install "setuptools<81" wheel
      - python -m pip install -r requirements.txt
      - python -m pip install -r docs/requirements.txt
      - python -m pip install numpy
      - python -m pip install sphinx sphinx-rtd-theme breathe nbsphinx ipython

    build:
      html:
        - cmake -S . -B build -DBUILD_DOCS=ON -DSKBUILD=ON -DCYTHON_EXECUTABLE=/usr/bin/cython3 -DSPHINX_EXECUTABLE="$(python -c "import os,sysconfig; print(os.path.join(sysconfig.get_path(\"scripts\"), \"sphinx-build\"))")"
        - cmake --build build --target py_docs
        - mkdir -p "$READTHEDOCS_OUTPUT/html"
        - cp -r docs/build/* "$READTHEDOCS_OUTPUT/html/"
        