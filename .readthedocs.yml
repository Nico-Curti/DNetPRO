version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - cmake
    - doxygen
  jobs:
    install:
      - python -m pip install --upgrade pip setuptools wheel
      - python -m pip install -r requirements.txt
      - python -m pip install -r docs/requirements.txt
      - python -m pip install "Cython>=3" "numpy>=1.26"
      - python -m cython --version
    build:
      html:
        - cmake -S . -B build -DBUILD_DOCS=ON -DSKBUILD=ON -DCYTHON_EXECUTABLE=\"$(python -c 'import shutil; print(shutil.which(\"cython\") or \"\")')"
        - cmake --build build --target py_docs
        - mkdir -p "$READTHEDOCS_OUTPUT/html"
        - cp -r docs/build/* "$READTHEDOCS_OUTPUT/html/"